<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقع الفائز بكأس العالم - عيادة فارس</title>
    <!-- استدعاء مكتبة الأيقونات FontAwesome لأيقونة الانستغرام -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB; /* خلفية زرقاء سمائي */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .form-container {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(8.5px);
            -webkit-backdrop-filter: blur(8.5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            max-width: 480px;
        }
        
        /* قسم الشعار المستطيل */
        .logo-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .clinic-logo {
            width: 100%;
            max-width: 280px; /* حجم مثالي ليتناسب مع عرض الكارت */
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background-color: #ffffff; /* خلفية بيضاء مطابقة للشعار */
            padding: 5px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            margin-top: 15px;
            margin-bottom: 25px;
            font-size: 22px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: bold;
        }
        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 8px;
            background-color: #ffffff; /* حقول بيضاء */
            color: #333333;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #0056b3;
            box-shadow: 0 0 8px rgba(0, 86, 179, 0.5);
        }
        
        /* تصميم شبكة أعلام الفرق */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .team-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .team-option:hover {
            background-color: #f0f8ff;
        }
        .team-option input {
            display: none; /* إخفاء دائرة الراديو التقليدية */
        }
        .team-option img {
            width: 45px;
            height: 30px;
            object-fit: cover;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .team-option span {
            font-size: 12px;
            margin-top: 5px;
            color: #333;
            font-weight: 500;
        }
        /* تأثير عند اختيار الفريق */
        .team-option input:checked + img {
            transform: scale(1.1);
            box-shadow: 0 0 8px #0076a3;
            border-color: #0076a3;
        }
        .team-option input:checked ~ span {
            color: #0076a3;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #ffffff;
            color: #0076a3;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #f0f8ff;
        }
        button:active {
            transform: scale(0.98);
        }
        
        /* قسم انستغرام بآخر الصفحة */
        .instagram-section {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }
        .instagram-section p {
            margin: 0 0 10px 0;
            font-size: 15px;
            font-weight: bold;
        }
        .insta-icon {
            font-size: 35px;
            color: #ffffff;
            transition: transform 0.3s, color 0.3s;
            display: inline-block;
        }
        .insta-icon:hover {
            transform: scale(1.2);
            color: #e1306c; /* لون انستغرام الشهير عند التمرير */
        }

        /* نافذة النتيجة والكود */
        .result-box {
            display: none;
            text-align: center;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .code-display {
            font-size: 24px;
            font-weight: bold;
            color: #0076a3;
            margin: 10px 0;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <!-- قسم الشعار الجديد -->
    <div class="logo-section">
        <img src="logo.jpg" alt="شعار عيادة فارس لطب وتجميل الأسنان" class="clinic-logo">
    </div>

    <h2>توقع الفائز بكأس العالم</h2>
    
    <form id="predictionForm">
        <div class="form-group">
            <label for="name">١- الاسم الثلاثي:</label>
            <input type="text" id="name" required placeholder="اكتب اسمك الثلاثي">
        </div>
        
        <div class="form-group">
            <label for="phone">٢- رقمك:</label>
            <input type="tel" id="phone" required placeholder="07xxxxxxxx">
        </div>
        
        <div class="form-group">
            <label>٣- توقع الفريق الفائز بكأس العالم:</label>
            <div class="teams-grid">
                <!-- فرنسا -->
                <label class="team-option">
                    <input type="radio" name="team" value="فرنسا" required>
                    <img src="https://flagcdn.com/w80/fr.png" alt="فرنسا">
                    <span>فرنسا</span>
                </label>
                <!-- المغرب -->
                <label class="team-option">
                    <input type="radio" name="team" value="المغرب">
                    <img src="https://flagcdn.com/w80/ma.png" alt="المغرب">
                    <span>المغرب</span>
                </label>
                <!-- اسبانيا -->
                <label class="team-option">
                    <input type="radio" name="team" value="اسبانيا">
                    <img src="https://flagcdn.com/w80/es.png" alt="اسبانيا">
                    <span>اسبانيا</span>
                    </label>
                <!-- بلجيكا -->
                <label class="team-option">
                    <input type="radio" name="team" value="بلجيكا">
                    <img src="https://flagcdn.com/w80/be.png" alt="بلجيكا">
                    <span>بلجيكا</span>
                </label>
                <!-- النرويج -->
                <label class="team-option">
                    <input type="radio" name="team" value="النرويج">
                    <img src="https://flagcdn.com/w80/no.png" alt="النرويج">
                    <span>النرويج</span>
                </label>
                <!-- انجلترا -->
                <label class="team-option">
                    <input type="radio" name="team" value="انجلترا">
                    <img src="https://flagcdn.com/w80/gb-eng.png" alt="انجلترا">
                    <span>انجلترا</span>
                </label>
                <!-- الارجنتين -->
                <label class="team-option">
                    <input type="radio" name="team" value="الارجنتين">
                    <img src="https://flagcdn.com/w80/ar.png" alt="الارجنتين">
                    <span>الارجنتين</span>
                </label>
                <!-- سويسرا -->
                <label class="team-option">
                    <input type="radio" name="team" value="سويسرا">
                    <img src="https://flagcdn.com/w80/ch.png" alt="سويسرا">
                    <span>سويسرا</span>
                </label>
            </div>
        </div>
        
        <div class="form-group">
            <label for="referredBy">٤- عن طريق اي شخص استلم هذه البطاقة؟:</label>
            <input type="text" id="referredBy" required placeholder="اكتب اسم الشخص">
        </div>
        
        <button type="submit" id="submitBtn">إرسال</button>
    </form>

    <div id="resultBox" class="result-box">
        <h3>تم إرسال توقعك بنجاح! 🎉</h3>
        <p>الكود الخاص بك هو:</p>
        <div id="userCode" class="code-display"></div>
        <p>يرجى الاحتفاظ بهذا الكود.</p>
    </div>

    <!-- قسم تابعنا على انستغرام بآخر الكارت -->
    <div class="instagram-section">
        <p>تابعنا على انستغرام</p>
        <a href="https://instagram.com/farisdentalclinic" target="_blank" title="عيادة فارس لطب الأسنان" class="insta-icon">
            <i class="fab fa-instagram"></i>
        </a>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwn3cjAWw1-WC7At9XWMe1kQQfRzPegNWEO6XxhcuPSHfp5HaaLqn7OsJgc3ubybpbf/exec';

    document.getElementById('predictionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري الإرسال...';

        const selectedTeam = document.querySelector('input[name="team"]:checked').value;

        const formData = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            prediction: selectedTeam,
            referredBy: document.getElementById('referredBy').value
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', 
            cache: 'no-cache',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        })
        .then(response => {
            const randomSuffix = Math.floor(1000 + Math.random() * 9000);
            const generatedCode = "WC-" + randomSuffix;

            document.getElementById('predictionForm').style.display = 'none';
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'block';
            document.getElementById('userCode').innerText = generatedCode;
        })
        .catch(error => {
            alert('حدث خطأ أثناء الإرسال، يرجى المحاولة مرة أخرى.');
            submitBtn.disabled = false;
            submitBtn.innerText = 'إرسال';
        });
    });
</script>

</body>
</html>
